version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moltchat
      POSTGRES_PASSWORD: moltchat
      POSTGRES_DB: moltchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moltchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://moltchat:moltchat@postgres:5432/moltchat
      PUBLIC_URL: http://localhost:3457
      CORS_ORIGINS: "http://localhost:3457,http://localhost:3456"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3457:3457"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456
    depends_on:
      - backend

volumes:
  postgres_data:
