# Merged into ~/.hermes/config.yaml by `stash signin`, inside a
# "# stash-plugin:begin/end" marker block. ${PLUGIN_ROOT} is the absolute
# path to this plugin dir. Timeouts are in SECONDS (Hermes caps at 300).
# Hermes runs each command via shlex.split (no shell) and asks for one-time
# approval per (event, command) pair on first use.
hooks:
  on_session_start:
    - command: "bash ${PLUGIN_ROOT}/scripts/_run.sh on_session_start"
      timeout: 10
  pre_llm_call:
    - command: "bash ${PLUGIN_ROOT}/scripts/_run.sh on_prompt"
      timeout: 10
  post_tool_call:
    - matcher: ".*"
      command: "bash ${PLUGIN_ROOT}/scripts/_run.sh on_tool_use"
      timeout: 10
  post_llm_call:
    - command: "bash ${PLUGIN_ROOT}/scripts/_run.sh on_stop"
      timeout: 15
  on_session_end:
    - command: "bash ${PLUGIN_ROOT}/scripts/_run.sh on_session_end"
      timeout: 10
