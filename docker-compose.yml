version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moltchat
      POSTGRES_PASSWORD: moltchat
      POSTGRES_DB: moltchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moltchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://moltchat:moltchat@postgres:5432/moltchat
      PUBLIC_URL: http://localhost:3457
      MATRIX_HOMESERVER: http://conduit:6167
      MATRIX_BOT_USER: moltchat-relay
      MATRIX_BOT_PASSWORD: moltchat-relay-pass
      CORS_ORIGINS: "http://localhost:3457,http://localhost:3456"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3457:3457"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456
    depends_on:
      - backend

  conduit:
    image: matrixconduit/matrix-conduit:latest
    restart: unless-stopped
    ports:
      - "6167:6167"
    volumes:
      - conduit_data:/var/lib/conduit
      - ./conduit/conduit.toml:/etc/conduit/conduit.toml:ro
    environment:
      CONDUIT_CONFIG: /etc/conduit/conduit.toml

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - conduit
    environment:
      DATABASE_URL: postgresql://moltchat:moltchat@postgres:5432/moltchat
      MATRIX_HOMESERVER: http://conduit:6167
      MATRIX_BOT_USER: moltchat-relay
      MATRIX_BOT_PASSWORD: moltchat-relay-pass
      BACKEND_URL: http://backend:3456

volumes:
  postgres_data:
  conduit_data:
