name: CI

on:
  push:
  pull_request:

jobs:
  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-test:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Pinned to requirements-dev.txt so CI and local runs format identically —
      # an unpinned formatter drifts style across releases and re-reds every PR.
      - run: pip install "$(grep '^ruff==' backend/requirements-dev.txt)"
      - run: ruff check backend/ cli/
      - run: ruff format --check backend/ cli/

  migration-graph:
    name: Migration graph (single head)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "$(grep '^alembic' backend/requirements.txt)"
      # Two PRs merging migrations onto the same parent leave alembic with two
      # heads and break every deploy (#712 + #713 both shipped "0125"). PR CI
      # runs against the merge ref, so this reds the second PR before merge.
      - run: python backend/migrations/check_heads.py

  plugin-test:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install plugin test dependencies
        run: pip install -r backend/requirements-dev.txt -e .

      - name: Run plugin tests
        run: python -m pytest plugins/tests --no-cov

  cli-test:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install CLI test dependencies
        run: pip install -r backend/requirements-dev.txt -e .

      - name: Run CLI tests
        run: python -m pytest cli/tests --no-cov

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: stash
          POSTGRES_PASSWORD: stash
          POSTGRES_DB: stash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
          TEST_DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
        run: python -m alembic upgrade head

      - name: Run pytest with coverage
        env:
          DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
          TEST_DATABASE_URL: postgresql://stash:stash@localhost:5432/stash_test
        run: python -m pytest -v
