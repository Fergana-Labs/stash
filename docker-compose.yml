version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stash
      POSTGRES_PASSWORD: stash
      POSTGRES_DB: stash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
      PUBLIC_URL: http://localhost:3457
      CORS_ORIGINS: "http://localhost:3457,http://localhost:3456"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stash:stash@postgres:5432/stash
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "backend.celery_app", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3457:3457"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3456
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
