<!DOCTYPE html>

      <p>SVG embedded inline.</p>
    </div>
    <div class="card">
      <img alt="picsum" src="https://picsum.photos/seed/native-export-1/600/360">
      <h3>HTTP URL</h3>
      <p>Random photo from picsum.photos.</p>
    </div>
    <div class="card">

      <h3>HTTP URL #2</h3>
      <p>Second random photo.</p>

</section>
